<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - RealEstate Pune</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow p-4" style="width:100%; max-width:450px;">
      <div class="text-center mb-4">
        <i class="fa fa-home fa-3x text-primary"></i>
        <h4 class="mt-2 text-primary">RealEstate Pune</h4>
        <p class="text-muted">Create your account</p>
      </div>
      <div id="alertBox"></div>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-user"></i></span>
          <input type="text" id="name" class="form-control" placeholder="Enter your full name"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-phone"></i></span>
          <input type="text" id="phone" class="form-control" placeholder="Enter 10-digit phone number"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Create a password"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Register As</label>
        <select id="role" class="form-select">
          <option value="user">User (Buyer / Renter)</option>
          <option value="agent">Agent (Property Owner / Dealer)</option>
        </select>
        <small class="text-muted">Agents can list properties. Users can browse and inquire.</small>
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" onclick="register()">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
      <p class="text-center text-muted mb-0">
        Already have an account? <a href="/login">Login here</a>
      </p>
      <p class="text-center mt-2">
        <a href="/" class="text-muted small"><i class="fa fa-arrow-left"></i> Back to Home</a>
      </p>
    </div>
  </div>
  <script>
    async function register() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      const box      = document.getElementById('alertBox');

      if (!name || !email || !phone || !password) {
        box.innerHTML = `<div class="alert alert-warning">Please fill in all fields.</div>`;
        return;
      }
      if (phone.length !== 10) {
        box.innerHTML = `<div class="alert alert-warning">Enter a valid 10-digit phone number.</div>`;
        return;
      }
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, email, phone, password, role })
      });
      const data = await res.json();
      if (res.ok) {
        box.innerHTML = `<div class="alert alert-success">Account created! Redirecting to login...</div>`;
        setTimeout(() => window.location.href = '/login', 1500);
      } else {
        box.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      }
    }
  </script>
</body>
</html>
