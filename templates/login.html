<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - RealEstate Pune</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width:100%; max-width:420px;">
      <div class="text-center mb-4">
        <i class="fa fa-home fa-3x text-primary"></i>
        <h4 class="mt-2 text-primary">RealEstate Pune</h4>
        <p class="text-muted">Login to your account</p>
      </div>
      <div id="alertBox"></div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
        </div>
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" onclick="login()">
        <i class="fa fa-sign-in-alt"></i> Login
      </button>
      <p class="text-center text-muted mb-0">
        Don't have an account? <a href="/register">Register here</a>
      </p>
      <p class="text-center mt-2">
        <a href="/" class="text-muted small"><i class="fa fa-arrow-left"></i> Back to Home</a>
      </p>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">&copy; 2026 Romil Pawar | Real Estate Listing Platform - Pune</p>
  <p class="mb-0 small text-muted">All Rights Reserved</p>
  </footer>

  <script>
    if (localStorage.getItem('user')) window.location.href = '/dashboard';

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const box      = document.getElementById('alertBox');

      if (!email || !password) {
        box.innerHTML = `<div class="alert alert-warning">Please fill in all fields.</div>`;
        return;
      }
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('user', JSON.stringify(data.user));
        box.innerHTML = `<div class="alert alert-success">Login successful! Redirecting...</div>`;
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
        }, 1000);
      } else {
        box.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
